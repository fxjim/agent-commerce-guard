<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Agent Commerce Guard Payment</title>
    <meta
      name="description"
      content="Verify an Agent Commerce Guard Base USDC payment transaction hash through the live checkout verifier."
    >
    <link rel="canonical" href="https://agent-commerce-guard.vercel.app/verify">
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fb;
        --fg: #17202a;
        --muted: #53606f;
        --border: #d8dee8;
        --accent: #1b6ef3;
        --panel: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111418;
          --fg: #eef3f8;
          --muted: #a7b1bd;
          --border: #2a323d;
          --accent: #7aa7ff;
          --panel: #171c22;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--fg);
        background: var(--bg);
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.4rem);
        line-height: 1.02;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
      }

      form {
        margin-top: 28px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 650;
      }

      input {
        width: 100%;
        min-height: 44px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
        color: var(--fg);
        background: transparent;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      button,
      .button {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: var(--fg);
        background: transparent;
        text-decoration: none;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button.primary,
      .button.primary {
        color: white;
        background: var(--accent);
      }

      .status {
        margin-top: 14px;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Verify Payment</h1>
      <p>
        Paste a Base transaction hash to open the official live Agent Commerce Guard verifier.
      </p>

      <form id="verify-form">
        <label for="tx">Base Transaction Hash</label>
        <input id="tx" name="tx" type="text" spellcheck="false" placeholder="0x...">
        <div class="actions">
          <button class="primary" type="submit">Open Verifier</button>
          <a class="button" href="https://agent-commerce-guard.vercel.app/pay">Live Checkout</a>
        </div>
        <p class="status" id="status"></p>
      </form>
    </main>
    <script>
      (() => {
        const form = document.getElementById("verify-form");
        const input = document.getElementById("tx");
        const status = document.getElementById("status");
        const params = new URLSearchParams(window.location.search);
        const tx = params.get("tx");

        function openVerifier(hash) {
          if (!/^0x[a-fA-F0-9]{64}$/.test(hash || "")) {
            status.textContent = "Enter a valid 0x transaction hash.";
            return;
          }
          window.location.href = `https://agent-commerce-guard.vercel.app/verify?tx=${encodeURIComponent(hash)}`;
        }

        if (tx) {
          input.value = tx;
          openVerifier(tx);
        }

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          openVerifier(input.value.trim());
        });
      })();
    </script>
  </body>
</html>
